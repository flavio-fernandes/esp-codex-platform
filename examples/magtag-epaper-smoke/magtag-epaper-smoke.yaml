substitutions:
  name: magtag-epaper-smoke
  friendly_name: MagTag E-Paper Smoke

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - component.update: magtag_epaper

esp32:
  board: adafruit_magtag29_esp32s2
  framework:
    type: arduino

logger:
  hardware_uart: USB_CDC

output:
  - platform: gpio
    id: red_led
    pin: GPIO13

interval:
  - interval: 1s
    then:
      - output.turn_on: red_led
      - delay: 500ms
      - output.turn_off: red_led

spi:
  clk_pin: GPIO36
  mosi_pin: GPIO35

display:
  - platform: waveshare_epaper
    id: magtag_epaper
    cs_pin: GPIO8
    dc_pin: GPIO7
    busy_pin: GPIO5
    reset_pin: GPIO6
    model: gdew029t5
    update_interval: never
    lambda: |-
      it.fill(COLOR_OFF);
      it.rectangle(4, 4, 288, 120, COLOR_ON);
      it.filled_rectangle(18, 20, 80, 24, COLOR_ON);
      it.circle(64, 84, 24, COLOR_ON);
      it.triangle(148, 108, 190, 42, 232, 108, COLOR_ON);
      it.filled_rectangle(250, 56, 28, 40, COLOR_ON);
