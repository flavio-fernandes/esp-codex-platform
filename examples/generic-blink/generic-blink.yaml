substitutions:
  # Compileable placeholder; change these before flashing real hardware.
  board: featheresp32
  flash_size: 4MB
  status_led_pin: GPIO13

esphome:
  name: generic-blink
  friendly_name: Generic Blink

esp32:
  board: ${board}
  flash_size: ${flash_size}
  framework:
    type: arduino

logger:

output:
  - platform: gpio
    id: status_led
    pin: ${status_led_pin}

interval:
  - interval: 500ms
    then:
      - output.turn_on: status_led
      - delay: 250ms
      - output.turn_off: status_led
