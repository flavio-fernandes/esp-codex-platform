substitutions:
  board: esp32dev
  flash_size: 4MB
  status_led_pin: GPIO2

esphome:
  name: esp32-devkit-gpio2-blink
  friendly_name: ESP32 DevKit GPIO2 Blink

esp32:
  board: ${board}
  flash_size: ${flash_size}
  framework:
    type: arduino

logger:

output:
  - platform: gpio
    id: status_led
    pin: ${status_led_pin}

interval:
  - interval: 500ms
    then:
      - output.turn_on: status_led
      - delay: 250ms
      - output.turn_off: status_led
